[package]
name = "kvs"
version = "0.1.0"
authors = ["thedevplus"]
description = "A log-structured key-value store implemented in Rust"
edition = "2024"
license = "MIT"
repository = "https://github.com/thedevplus/kvs"
homepage = "https://github.com/thedevplus"
keywords = ["key-value", "database", "storage", "log-structured"]
categories = ["database", "data-structures"]

[dependencies]
clap = { version = "4.6.1", features = ["derive"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
thiserror = "2.0.18"

[dev-dependencies]
assert_cmd = "0.11.0"
predicates = "1.0.0"
tempfile = "3.27.0"
walkdir = "2.5.0"
